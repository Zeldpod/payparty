<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6c4dff">
  <meta name="robots" content="noindex, nofollow">
  <title>PayParty — Payout Console</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #170e2d;
      --ink-soft: #615773;
      --ink-faint: #948aa8;
      --purple: #6c4dff;
      --purple-light: #9b7cff;
      --purple-dark: #5330ec;
      --green: #0bcf71;
      --green-dark: #008f4c;
      --red: #e2456b;
      --glass: rgba(255, 255, 255, .7);
      --line: rgba(108, 77, 255, .13);
      --shadow: 0 34px 90px rgba(45, 21, 118, .26), 0 8px 28px rgba(83, 48, 236, .12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { min-height: 100%; }
    body {
      min-height: 100vh;
      padding: 34px;
      color: var(--ink);
      background: #eee9ff;
      font-family: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input { font: inherit; }
    button { color: inherit; cursor: pointer; }
    ::selection { color: #fff; background: var(--purple); }

    .background-wash { position: fixed; inset: 0; z-index: -3; pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), transparent 35%),
        radial-gradient(60% 80% at 50% 48%, rgba(255,255,255,.2), rgba(255,255,255,.03) 75%); }
    .orb { position: fixed; z-index: -2; border-radius: 50%; pointer-events: none; filter: blur(12px); }
    .orb-one { width: 300px; height: 300px; top: -120px; left: -80px; background: rgba(255,255,255,.23); }
    .orb-two { width: 260px; height: 260px; right: -80px; bottom: -100px; background: rgba(114,74,255,.18); }

    .shell {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 26px 28px 22px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.79), rgba(255,255,255,.57)),
        var(--glass);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.98);
      backdrop-filter: blur(30px) saturate(1.4);
      -webkit-backdrop-filter: blur(30px) saturate(1.4);
    }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 22px; gap: 14px; flex-wrap: wrap; }
    .brand { display: inline-flex; align-items: center; gap: 11px; }
    .brand-mark { width: 39px; height: 39px; border-radius: 12px; background: url("assets/app-icon.png") center / cover no-repeat, linear-gradient(145deg, var(--purple-light), var(--purple-dark)); box-shadow: 0 8px 22px rgba(95,55,240,.38); }
    .brand-name { font-family: "Bricolage Grotesque", sans-serif; font-size: 21px; font-weight: 800; letter-spacing: -.035em; }
    .brand-name small { display: block; color: var(--ink-faint); font-family: "Hanken Grotesk", sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }

    .gate { display: flex; align-items: center; gap: 9px; }
    .gate input {
      width: 230px; padding: 11px 14px; border: 1px solid var(--line); border-radius: 13px;
      color: var(--ink); background: rgba(255,255,255,.8); outline: 0; font-weight: 700;
    }
    .gate input:focus { border-color: rgba(108,77,255,.4); box-shadow: 0 0 0 3px rgba(108,77,255,.1); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 16px; border: 1px solid rgba(255,255,255,.78); border-radius: 13px;
      color: #4b29cf; background: #fff; font-weight: 800; white-space: nowrap;
      box-shadow: 0 10px 24px rgba(35,13,117,.18), inset 0 1px 0 #fff;
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease, opacity .18s ease;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(35,13,117,.27); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.primary { color: #fff; background: linear-gradient(145deg, var(--purple-light), var(--purple-dark)); border-color: transparent; }
    .btn.pay { color: #fff; background: linear-gradient(145deg, #2fe08b, var(--green-dark)); border-color: transparent; }
    .btn.fail { color: var(--red); background: rgba(226,69,107,.08); border-color: rgba(226,69,107,.22); box-shadow: none; }
    .btn.small { padding: 8px 12px; font-size: 12.5px; border-radius: 11px; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar h1 { font-family: "Bricolage Grotesque", sans-serif; font-size: 23px; letter-spacing: -.04em; }
    .count-pill { display: inline-flex; align-items: center; gap: 7px; margin-left: 10px; padding: 5px 11px; border-radius: 999px; color: var(--purple-dark); background: rgba(108,77,255,.1); font-size: 12px; font-weight: 800; vertical-align: middle; }

    .panel { border: 1px solid var(--line); border-radius: 22px; background: rgba(255,255,255,.7); overflow: hidden; }
    .row {
      display: grid; grid-template-columns: 1.1fr .8fr 1.5fr .6fr auto; gap: 14px;
      align-items: center; padding: 16px 20px; border-top: 1px solid var(--line);
    }
    .row:first-child { border-top: 0; }
    .row .label { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint); margin-bottom: 3px; }
    .row .amount { font-family: "Bricolage Grotesque", sans-serif; font-size: 19px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .row .method { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; text-transform: capitalize; background: rgba(108,77,255,.1); color: var(--purple-dark); }
    .row .method.paypal { background: rgba(0,112,186,.12); color: #0a6bb3; }
    .row .dest { font-weight: 700; word-break: break-word; }
    .row .meta { color: var(--ink-soft); font-size: 11.5px; }
    .row .actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

    .empty, .locked { padding: 46px 20px; text-align: center; color: var(--ink-soft); }
    .empty strong, .locked strong { display: block; font-family: "Bricolage Grotesque", sans-serif; font-size: 18px; color: var(--ink); margin-bottom: 6px; }

    .toast {
      position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(18px);
      max-width: 90vw; padding: 13px 20px; border-radius: 15px; color: #fff; font-weight: 700;
      background: linear-gradient(145deg, var(--purple-light), var(--purple-dark));
      box-shadow: 0 18px 40px rgba(60,28,170,.4); opacity: 0; pointer-events: none;
      transition: opacity .25s ease, transform .25s ease; z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: linear-gradient(145deg, #f0688a, #c52a52); }

    @media (max-width: 760px) {
      body { padding: 18px; }
      .row { grid-template-columns: 1fr 1fr; }
      .row .actions { grid-column: 1 / -1; justify-content: flex-start; }
      .gate input { width: 160px; }
    }
  </style>
</head>
<body>
  <div class="background-wash" aria-hidden="true"></div>
  <div class="orb orb-one" aria-hidden="true"></div>
  <div class="orb orb-two" aria-hidden="true"></div>

  <main class="shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="PayParty home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">PayParty<small>Payout Console</small></span>
      </a>
      <form class="gate" id="gate" autocomplete="off">
        <input id="secret" type="password" placeholder="Admin secret" aria-label="Admin secret" autocomplete="off">
        <button class="btn primary" id="unlock" type="submit">Unlock</button>
      </form>
    </header>

    <div class="toolbar">
      <h1>Pending cash-outs <span class="count-pill" id="count" hidden>0</span></h1>
      <button class="btn small" id="refresh" type="button" disabled>Refresh</button>
    </div>

    <section class="panel" id="panel">
      <div class="locked" id="state">
        <strong>Locked</strong>
        Enter the admin secret to load pending payouts.
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    // The admin secret lives ONLY in this in-memory variable — never stored,
    // never put in the URL, never persisted. A refresh clears it.
    let ADMIN_SECRET = '';
    const API = '/api/payout';

    const $ = (id) => document.getElementById(id);
    const fmt = (n) => '$' + Number(n).toFixed(2);
    const when = (iso) => { try { return new Date(iso).toLocaleString(); } catch { return iso; } };

    let toastTimer;
    function toast(msg, isError) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.toggle('error', !!isError);
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
    }

    async function call(payload) {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': ADMIN_SECRET },
        body: JSON.stringify(payload),
      });
      let data = null;
      try { data = await res.json(); } catch { /* ignore */ }
      if (!res.ok) {
        const message = (data && data.error) || ('Request failed (' + res.status + ')');
        throw new Error(message);
      }
      return data || {};
    }

    function setBusy(busy) {
      $('refresh').disabled = busy || !ADMIN_SECRET;
      document.querySelectorAll('.row .btn').forEach((b) => { b.disabled = busy; });
    }

    function render(cashouts) {
      const panel = $('panel');
      const count = $('count');
      count.hidden = false;
      count.textContent = cashouts.length;

      if (!cashouts.length) {
        panel.innerHTML = '<div class="empty"><strong>All clear</strong>No pending cash-outs right now.</div>';
        return;
      }

      panel.innerHTML = cashouts.map((c) => {
        const manual = c.method !== 'paypal';
        const methodClass = c.method === 'paypal' ? 'method paypal' : 'method';
        const payLabel = manual ? 'Mark paid' : 'Pay via PayPal';
        const payAction = manual ? 'mark_paid' : 'pay';
        return (
          '<div class="row" data-id="' + c.id + '">' +
            '<div><div class="label">Amount</div><div class="amount">' + fmt(c.amount) + '</div></div>' +
            '<div><div class="label">Method</div><span class="' + methodClass + '">' + String(c.method).replace('_', ' ') + '</span></div>' +
            '<div><div class="label">Destination</div><div class="dest">' + escapeHtml(c.destination) + '</div></div>' +
            '<div><div class="label">Requested</div><div class="meta">' + when(c.created_at) + '</div></div>' +
            '<div class="actions">' +
              '<button class="btn pay small" data-act="' + payAction + '">' + payLabel + '</button>' +
              '<button class="btn fail small" data-act="fail">Fail</button>' +
            '</div>' +
          '</div>'
        );
      }).join('');

      panel.querySelectorAll('.row .btn').forEach((btn) => {
        btn.addEventListener('click', () => onAction(btn));
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    async function load() {
      if (!ADMIN_SECRET) return;
      setBusy(true);
      $('state') && ($('state').textContent = 'Loading…');
      try {
        const data = await call({ action: 'list' });
        render(data.cashouts || []);
      } catch (err) {
        $('panel').innerHTML = '<div class="locked"><strong>Could not load</strong>' + escapeHtml(err.message) + '</div>';
        toast(err.message, true);
        if (/unauthorized/i.test(err.message)) ADMIN_SECRET = '';
      } finally {
        setBusy(false);
      }
    }

    async function onAction(btn) {
      const row = btn.closest('.row');
      const id = row.getAttribute('data-id');
      const act = btn.getAttribute('data-act');

      let payload = { action: act, id };
      if (act === 'mark_paid') {
        const reference = prompt('Payout reference (transaction id / confirmation) for this manual payout:');
        if (reference === null) return;
        if (!reference.trim()) { toast('A reference is required to mark paid.', true); return; }
        payload.reference = reference.trim();
      }
      if (act === 'fail' && !confirm('Fail this cash-out? The amount is refunded to the user.')) return;
      if (act === 'pay' && !confirm('Send this PayPal payout now? This moves real money.')) return;

      setBusy(true);
      try {
        const res = await call(payload);
        if (res.manual) {
          toast('This method is paid manually — use Mark paid once sent.');
        } else if (res.status === 'paid') {
          toast('Paid' + (res.reference ? ' · ' + res.reference : ''));
        } else if (res.status === 'failed') {
          toast('Marked failed and refunded.');
        } else {
          toast('Done.');
        }
        await load();
      } catch (err) {
        toast(err.message, true);
        setBusy(false);
      }
    }

    $('gate').addEventListener('submit', (e) => {
      e.preventDefault();
      const val = $('secret').value.trim();
      if (!val) { toast('Enter the admin secret.', true); return; }
      ADMIN_SECRET = val;
      $('secret').value = '';
      $('refresh').disabled = false;
      load();
    });
    $('refresh').addEventListener('click', load);
  </script>
</body>
</html>
