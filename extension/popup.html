<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root{--ink:#160d2e;--ink-soft:#5a5170;--purple:#6C4DFF;--purple-lt:#8B5CFF;--green-dk:#00a344;--brd:rgba(108,77,255,.16)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:300px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(80% 80% at 20% 0%,#efe9ff,#fbfaff);padding:16px}
  .top{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .mark{display:grid;place-items:center;width:30px;height:30px;border-radius:9px;color:#fff;font-weight:900;font-size:16px;background:linear-gradient(150deg,var(--purple-lt),var(--purple))}
  .name{font-weight:800;font-size:16px;letter-spacing:-.01em}
  .bal{border-radius:16px;padding:16px;color:#fff;background:linear-gradient(150deg,#8B5CFF,#5A35FF);box-shadow:0 12px 26px rgba(90,53,255,.35)}
  .bal .l{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.85}
  .bal .a{font-weight:800;font-size:30px;letter-spacing:-.02em;margin-top:3px}
  .bal .s{font-size:11.5px;opacity:.85;margin-top:2px}
  .row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:14px;font-weight:600}
  .sw{width:46px;height:26px;border-radius:99px;background:#d9d1f5;position:relative;cursor:pointer;transition:background .2s}
  .sw.on{background:linear-gradient(90deg,var(--purple),var(--purple-lt))}
  .sw i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 2px 6px rgba(0,0,0,.2)}
  .sw.on i{left:23px}
  .btn{display:block;width:100%;margin-top:14px;padding:12px;border-radius:12px;text-align:center;font-weight:800;font-size:14px;cursor:pointer;border:none;
    color:#fff;background:linear-gradient(180deg,#a488ff,#5e34f0);box-shadow:0 10px 22px rgba(108,77,255,.4)}
  .hint{margin-top:10px;font-size:11px;color:var(--ink-soft);text-align:center}
</style>
</head>
<body>
  <div class="top"><span class="mark">P</span><span class="name">PayParty</span></div>
  <div class="bal"><div class="l">Balance</div><div class="a" id="bal">$0.00</div><div class="s" id="life">$0.00 all-time</div></div>
  <div class="row"><span>Show "Earn" button on pages</span><span class="sw" id="sw"><i></i></span></div>
  <button class="btn" id="dash">Open dashboard →</button>
  <div class="hint">Click the <b>Earn</b> button on any page → your widget pops out, floating on top. Bigger = higher-paying ads 📈</div>
  <script src="popup.js"></script>
</body>
</html>
