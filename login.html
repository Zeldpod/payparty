<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="admaven-placement" content="BqTa5rjn4">
<title>PayParty — Log in</title>
<meta name="description" content="Log in or create your PayParty account to track your balance and cash out. Get paid for screen time.">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  :root{
    --ink:#160d2e;--ink-soft:#5a5170;--ink-faint:#8b83a3;
    --purple:#6C4DFF;--purple-lt:#8B5CFF;--purple-dk:#5A35FF;
    --green:#00C853;--green-dk:#00a344;--red:#e23b6b;
    --glass-brd:rgba(108,77,255,.16);--glass-brd-strong:rgba(108,77,255,.30);
    --field-bg:#fff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--ink);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    background:#faf8ff;display:grid;place-items:center;min-height:100%;
    padding:clamp(16px,4vh,48px) 16px;overflow-x:hidden}
  ::selection{background:var(--purple);color:#fff}

  canvas[data-silk]{position:fixed;inset:0;width:100%;height:100%;z-index:0}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(64% 60% at 50% 42%,rgba(255,255,255,.58),rgba(255,255,255,0) 76%)}

  .disp{font-family:'Bricolage Grotesque',sans-serif}
  .grad{background:linear-gradient(100deg,var(--purple-lt),var(--purple-dk));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  /* ---- glass card ---- */
  .card{position:relative;z-index:2;width:min(444px,calc(100vw - 32px));border-radius:30px;
    padding:clamp(26px,4vw,38px) clamp(22px,4vw,34px);
    background:rgba(255,255,255,.74);
    backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);
    border:1px solid rgba(255,255,255,.85);
    box-shadow:0 30px 80px rgba(60,37,150,.26),0 2px 6px rgba(60,37,150,.10),0 1px 0 rgba(255,255,255,.95) inset;
    animation:rise .6s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(18px) scale(.985)}to{opacity:1;transform:none}}

  /* ---- brand ---- */
  .brand{display:flex;align-items:center;gap:11px;justify-content:center}
  .brand .mark{display:block;width:42px;height:42px;border-radius:13px;flex:none;
    background:url('assets/app-icon.png') center/cover no-repeat,linear-gradient(150deg,var(--purple-lt),var(--purple-dk));
    box-shadow:0 8px 20px rgba(108,77,255,.42),0 1px 0 rgba(255,255,255,.5) inset}
  .brand .name{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:23px;letter-spacing:-.02em}

  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(25px,6vw,29px);line-height:1.06;letter-spacing:-.025em;text-align:center;margin-top:20px}
  .sub{text-align:center;color:var(--ink-soft);font-size:14.5px;line-height:1.5;margin-top:8px;max-width:34ch;margin-left:auto;margin-right:auto}

  /* ---- tabs (segmented) ---- */
  .tabs{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:0;margin:22px auto 18px;
    padding:4px;border-radius:15px;background:rgba(108,77,255,.09);width:100%;max-width:300px}
  .tabs button{position:relative;z-index:1;border:none;background:none;font-family:inherit;font-weight:700;font-size:14px;
    color:var(--ink-soft);padding:10px 12px;border-radius:11px;cursor:pointer;transition:color .25s}
  .tabs button.on{color:var(--purple)}
  .tabs .glider{position:absolute;z-index:0;top:4px;bottom:4px;left:4px;width:calc(50% - 4px);
    border-radius:11px;background:#fff;box-shadow:0 4px 12px rgba(108,77,255,.18),0 1px 0 rgba(255,255,255,.9) inset;
    transition:transform .32s cubic-bezier(.34,1.4,.64,1)}
  .tabs[data-mode="login"] .glider{transform:translateX(100%)}

  /* ---- buttons ---- */
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border-radius:14px;
    font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;
    transition:transform .16s cubic-bezier(.34,1.4,.64,1),box-shadow .25s,filter .25s,border-color .2s,background .2s}
  .btn:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(108,77,255,.30)}
  .btn:active{transform:scale(.985)}
  .btn:disabled{opacity:.62;cursor:default;pointer-events:none}
  .btn+.btn{margin-top:10px}

  .btn-oauth{background:#fff;border:1px solid var(--glass-brd);color:var(--ink)}
  .btn-oauth:hover{border-color:var(--glass-brd-strong);transform:translateY(-1px);box-shadow:0 8px 22px rgba(108,77,255,.14)}

  .btn-primary{color:#fff;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.3);margin-top:14px;
    background:linear-gradient(180deg,#a488ff,#7c57ff 46%,#5e34f0);
    box-shadow:0 1px 0 rgba(255,255,255,.55) inset,0 -12px 20px rgba(52,24,128,.42) inset,0 14px 32px rgba(108,77,255,.5)}
  .btn-primary>span{position:relative;z-index:2;display:inline-flex;align-items:center;gap:8px}
  .btn-primary:hover{filter:brightness(1.07);transform:translateY(-1px);
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 -12px 22px rgba(52,24,128,.48) inset,0 20px 44px rgba(108,77,255,.62)}
  .btn-primary::after{content:"";position:absolute;top:0;bottom:0;left:-70%;width:48%;transform:skewX(-18deg);pointer-events:none;z-index:1;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.55),transparent);transition:left .65s cubic-bezier(.4,0,.2,1)}
  .btn-primary:hover::after{left:120%}
  /* tiny spinner shown while submitting */
  .spin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
    display:none;animation:spin .7s linear infinite}
  .btn-primary.loading .spin{display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- divider ---- */
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0 4px;color:var(--ink-faint);font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--glass-brd),transparent)}

  /* ---- fields ---- */
  .field-wrap{position:relative;margin-top:11px}
  .field{display:block;width:100%;padding:14px 16px;border-radius:14px;font-size:15px;color:var(--ink);font-family:inherit;
    background:var(--field-bg);border:1px solid var(--glass-brd);outline:none;
    transition:border-color .15s,box-shadow .15s,background .15s}
  .field::placeholder{color:var(--ink-faint)}
  .field:hover{border-color:var(--glass-brd-strong)}
  .field:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(108,77,255,.16)}
  #password{padding-right:52px}
  .toggle-pw{position:absolute;right:6px;top:50%;transform:translateY(-50%);display:grid;place-items:center;
    width:40px;height:40px;border:none;background:none;cursor:pointer;color:var(--ink-faint);border-radius:10px;transition:color .15s,background .15s}
  .toggle-pw:hover{color:var(--purple);background:rgba(108,77,255,.08)}
  .toggle-pw:focus-visible{outline:none;color:var(--purple);box-shadow:0 0 0 3px rgba(108,77,255,.22)}

  /* ---- message states ---- */
  .msg{margin-top:14px;text-align:center;font-size:13.5px;font-weight:600;line-height:1.45;min-height:18px;
    transition:color .2s}
  .msg.err{color:var(--red)}
  .msg.ok{color:var(--green-dk)}

  /* ---- trust + legal ---- */
  .trust{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px 10px;justify-content:center}
  .trust span{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--ink-soft);
    background:rgba(255,255,255,.6);border:1px solid var(--glass-brd);padding:6px 11px;border-radius:99px}
  .legal{margin-top:16px;text-align:center;font-size:11.5px;color:var(--ink-faint);line-height:1.55}
  .legal a{color:var(--purple);text-decoration:none;font-weight:600}
  .legal a:hover{text-decoration:underline}

  /* ---- back link ---- */
  .back{position:fixed;top:18px;left:18px;z-index:3;display:inline-flex;align-items:center;gap:6px;
    color:var(--ink-soft);font-weight:700;font-size:14px;text-decoration:none;
    background:rgba(255,255,255,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    padding:9px 15px 9px 13px;border-radius:99px;border:1px solid var(--glass-brd);
    box-shadow:0 4px 14px rgba(60,37,150,.10);transition:color .15s,transform .15s,box-shadow .2s}
  .back:hover{color:var(--purple);transform:translateY(-1px);box-shadow:0 8px 20px rgba(60,37,150,.16)}

  @media (max-width:380px){
    .trust span{font-size:11px;padding:5px 9px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
  <canvas data-silk></canvas>
  <div class="veil"></div>
  <a class="back" href="index.html"><span aria-hidden="true">←</span> Back</a>

  <main class="card">
    <div class="brand"><span class="mark" role="img" aria-label="PayParty"></span><span class="name">PayParty</span></div>
    <h1 id="title">Join the <span class="grad">party.</span></h1>
    <p class="sub" id="subtitle">Create your account and start getting paid for screen time.</p>

    <div class="tabs" data-mode="signup" role="tablist" aria-label="Sign up or log in">
      <span class="glider" aria-hidden="true"></span>
      <button id="tab-signup" class="on" role="tab" aria-selected="true">Sign up</button>
      <button id="tab-login" role="tab" aria-selected="false">Log in</button>
    </div>

    <button class="btn btn-oauth" id="google" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.9a5 5 0 0 1-2.2 3.3v2.7h3.6c2.1-2 3.2-4.9 3.2-7.9z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.7c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.8A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M6 14.4a6.6 6.6 0 0 1 0-4.2V7.4H2.3a11 11 0 0 0 0 9.8L6 14.4z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .5 4.1 1.6l3.1-3.1A11 11 0 0 0 2.3 7.4L6 10.2c.9-2.6 3.2-4.4 6-4.4z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or with email</div>

    <div class="field-wrap">
      <input class="field" id="email" type="email" placeholder="you@email.com" autocomplete="email" inputmode="email" autocapitalize="off" spellcheck="false" aria-label="Email address">
    </div>
    <div class="field-wrap">
      <input class="field" id="password" type="password" placeholder="Password (min. 6 characters)" autocomplete="current-password" aria-label="Password">
      <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Show password" aria-pressed="false">
        <svg id="eye-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="eye-hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c6.5 0 10 7 10 7a13.2 13.2 0 0 1-2.16 3M6.1 6.1A13.3 13.3 0 0 0 2 11s3.5 7 10 7a9 9 0 0 0 4-.9"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/><path d="M2 2l20 20"/></svg>
      </button>
    </div>

    <button class="btn btn-primary" id="submit" type="button"><span><i class="spin" aria-hidden="true"></i><span>Create account →</span></span></button>

    <div class="msg" id="msg" role="status" aria-live="polite"></div>

    <div class="trust">
      <span>🔒 No camera, ever</span>
      <span>🙅 No mic access</span>
      <span>💸 Cash out at $5</span>
    </div>

    <div class="legal">Payouts are reviewed before they send. By continuing you agree to PayParty's <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.</div>
  </main>

  <script src="assets/silk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
  (function(){
    const $ = (s) => document.querySelector(s);
    const msg = $('#msg');
    let mode = 'signup';
    // Robust base path: strip the last path segment so this works with clean
    // URLs (/login) as well as explicit files (/login.html).
    const BASE = location.origin + location.pathname.replace(/[^/]*$/, '');
    const REDIRECT = BASE + 'dashboard.html';
    function setMsg(text, kind){ msg.textContent = text || ''; msg.className = 'msg' + (kind ? ' ' + kind : ''); }

    // guard: library + config present?
    if (!window.supabase || !window.supabase.createClient) { setMsg('Could not load PayParty. Check your connection and refresh.', 'err'); return; }
    const KEY = window.PAYPARTY_SUPABASE_ANON_KEY || '';
    const sb = window.supabase.createClient(window.PAYPARTY_SUPABASE_URL, KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } });
    function configured(){ if (!KEY || KEY.indexOf('PASTE_') === 0){ setMsg('Setup: paste your Supabase anon key in supabase-config.js', 'err'); return false; } return true; }

    // already logged in? go to dashboard
    if (configured()) sb.auth.getSession().then(({ data }) => { if (data && data.session) location.replace('dashboard.html'); });

    // submit button: label + loading state (preserve #submit and its inner span)
    const submitBtn = $('#submit');
    const submitLabel = submitBtn.querySelector('span > span');
    function setLoading(on){ submitBtn.classList.toggle('loading', !!on); submitBtn.disabled = !!on; }

    function setMode(m){
      mode = m;
      $('#tab-signup').classList.toggle('on', m === 'signup');
      $('#tab-login').classList.toggle('on', m === 'login');
      $('#tab-signup').setAttribute('aria-selected', m === 'signup');
      $('#tab-login').setAttribute('aria-selected', m === 'login');
      document.querySelector('.tabs').setAttribute('data-mode', m);
      $('#title').innerHTML = m === 'signup' ? 'Join the <span class="grad">party.</span>' : 'Welcome <span class="grad">back.</span>';
      $('#subtitle').textContent = m === 'signup' ? 'Create your account and start getting paid for screen time.' : 'Log in to track your balance and cash out.';
      submitLabel.textContent = m === 'signup' ? 'Create account →' : 'Log in →';
      $('#password').setAttribute('autocomplete', m === 'signup' ? 'new-password' : 'current-password');
      setMsg('');
    }
    $('#tab-signup').onclick = () => setMode('signup');
    $('#tab-login').onclick = () => setMode('login');

    // password visibility toggle
    const pw = $('#password'), togglePw = $('#toggle-pw');
    togglePw.onclick = () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      $('#eye-show').style.display = show ? 'none' : '';
      $('#eye-hide').style.display = show ? '' : 'none';
      togglePw.setAttribute('aria-pressed', show);
      togglePw.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      pw.focus();
    };

    async function oauth(provider){
      if (!configured()) return;
      setMsg('Redirecting to ' + provider.charAt(0).toUpperCase() + provider.slice(1) + '…');
      const { error } = await sb.auth.signInWithOAuth({ provider, options: { redirectTo: REDIRECT } });
      if (error) setMsg(error.message, 'err');
    }
    $('#google').onclick = () => oauth('google');

    async function emailAuth(){
      if (!configured()) return;
      const email = $('#email').value.trim(), password = $('#password').value;
      if (!/.+@.+\..+/.test(email)) return setMsg('Please enter a valid email address.', 'err');
      if (password.length < 6) return setMsg('Password must be at least 6 characters.', 'err');
      setLoading(true);
      setMsg('Working…');
      try {
        if (mode === 'signup') {
          const { data, error } = await sb.auth.signUp({ email, password, options: { emailRedirectTo: REDIRECT } });
          if (error) { setLoading(false); return setMsg(error.message, 'err'); }
          if (data.session) location.replace('dashboard.html');
          else { setLoading(false); setMsg('Almost there — check your email to confirm your account. ✉️', 'ok'); }
        } else {
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) { setLoading(false); return setMsg(error.message, 'err'); }
          location.replace('dashboard.html');
        }
      } catch (e) { setLoading(false); setMsg(String(e.message || e), 'err'); }
    }
    $('#submit').onclick = emailAuth;
    $('#email').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#password').focus(); });
    $('#password').addEventListener('keydown', (e) => { if (e.key === 'Enter') emailAuth(); });
    setMode('signup');
  })();
  </script>
</body>
</html>
