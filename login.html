<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PayParty — Log in</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#160d2e;--ink-soft:#5a5170;--ink-faint:#8b83a3;
    --purple:#6C4DFF;--purple-lt:#8B5CFF;--purple-dk:#5A35FF;
    --green:#00C853;--green-dk:#00a344;--red:#e23b6b;
    --glass-brd:rgba(108,77,255,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--ink);
    -webkit-font-smoothing:antialiased;background:#fff;display:grid;place-items:center;overflow:hidden}
  canvas[data-silk]{position:fixed;inset:0;width:100%;height:100%;z-index:0}
  .veil{position:fixed;inset:0;z-index:1;background:radial-gradient(60% 60% at 50% 45%,rgba(255,255,255,.55),rgba(255,255,255,0) 75%)}
  .disp{font-family:'Bricolage Grotesque',sans-serif}
  .grad{background:linear-gradient(100deg,var(--purple-lt),var(--purple-dk));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  .card{position:relative;z-index:2;width:min(440px,calc(100vw - 32px));border-radius:28px;padding:34px 32px;
    background:rgba(255,255,255,.72);backdrop-filter:blur(26px) saturate(1.5);-webkit-backdrop-filter:blur(26px) saturate(1.5);
    border:1px solid rgba(255,255,255,.85);box-shadow:0 30px 70px rgba(60,37,150,.28),0 1px 0 rgba(255,255,255,.9) inset;
    animation:rise .6s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .brand{display:flex;align-items:center;gap:11px;justify-content:center}
  .brand .mark{display:grid;place-items:center;width:42px;height:42px;border-radius:13px;color:transparent;font-size:0;overflow:hidden;
    background:url('assets/app-icon.png') center/cover no-repeat;box-shadow:0 8px 20px rgba(108,77,255,.45)}
  .brand .name{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.02em}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:27px;letter-spacing:-.02em;text-align:center;margin-top:18px}
  .sub{text-align:center;color:var(--ink-soft);font-size:14.5px;margin-top:6px}

  .tabs{display:flex;gap:4px;margin:22px auto 18px;padding:4px;border-radius:14px;background:rgba(108,77,255,.08);width:fit-content}
  .tabs button{border:none;background:none;font-family:inherit;font-weight:700;font-size:14px;color:var(--ink-soft);
    padding:9px 22px;border-radius:11px;cursor:pointer;transition:.2s}
  .tabs button.on{background:#fff;color:var(--purple);box-shadow:0 4px 12px rgba(108,77,255,.16)}

  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border-radius:14px;
    font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;transition:transform .15s,box-shadow .25s,filter .25s,border-color .2s}
  .btn:active{transform:scale(.99)}
  .btn+.btn{margin-top:10px}
  .btn-oauth{background:#fff;border:1px solid var(--glass-brd);color:var(--ink)}
  .btn-oauth:hover{border-color:rgba(108,77,255,.32);transform:translateY(-1px)}
  .btn-primary{color:#fff;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.3);margin-top:12px;
    background:linear-gradient(180deg,#a488ff,#7c57ff 46%,#5e34f0);
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 -11px 18px rgba(52,24,128,.4) inset,0 12px 28px rgba(108,77,255,.5)}
  .btn-primary:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .btn-primary::after{content:"";position:absolute;top:0;bottom:0;left:-70%;width:48%;transform:skewX(-18deg);pointer-events:none;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.55),transparent);transition:left .6s}
  .btn-primary:hover::after{left:120%}

  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--ink-faint);font-size:12px;font-weight:600}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--glass-brd)}

  .field{display:block;width:100%;margin-top:10px;padding:14px 16px;border-radius:14px;font-size:15px;color:var(--ink);font-family:inherit;
    background:#fff;border:1px solid var(--glass-brd);outline:none;transition:border-color .15s,box-shadow .15s}
  .field:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(108,77,255,.16)}

  .msg{margin-top:14px;text-align:center;font-size:13.5px;font-weight:600;min-height:18px}
  .msg.err{color:var(--red)}
  .msg.ok{color:var(--green-dk)}
  .legal{margin-top:18px;text-align:center;font-size:11.5px;color:var(--ink-faint);line-height:1.5}
  .legal a{color:var(--purple);text-decoration:none}
  .trust{margin-top:14px;display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--ink-faint);font-weight:600}
  .back{position:fixed;top:20px;left:22px;z-index:3;color:var(--ink-soft);font-weight:700;font-size:14px;text-decoration:none;
    background:rgba(255,255,255,.7);backdrop-filter:blur(12px);padding:9px 15px;border-radius:99px;border:1px solid var(--glass-brd)}
  .back:hover{color:var(--purple)}
</style>
</head>
<body>
  <canvas data-silk></canvas>
  <div class="veil"></div>
  <a class="back" href="index.html">← Back</a>

  <div class="card">
    <div class="brand"><span class="mark">P</span><span class="name">PayParty</span></div>
    <h1 id="title">Join the <span class="grad">party.</span></h1>
    <p class="sub" id="subtitle">Create your account and start earning in seconds.</p>

    <div class="tabs">
      <button id="tab-signup" class="on">Sign up</button>
      <button id="tab-login">Log in</button>
    </div>

    <button class="btn btn-oauth" id="google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.9a5 5 0 0 1-2.2 3.3v2.7h3.6c2.1-2 3.2-4.9 3.2-7.9z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.7c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.8A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M6 14.4a6.6 6.6 0 0 1 0-4.2V7.4H2.3a11 11 0 0 0 0 9.8L6 14.4z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .5 4.1 1.6l3.1-3.1A11 11 0 0 0 2.3 7.4L6 10.2c.9-2.6 3.2-4.4 6-4.4z"/></svg>
      Continue with Google
    </button>
    <button class="btn btn-oauth" id="apple">
      <svg width="16" height="18" viewBox="0 0 384 512" fill="#111"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zM262.1 104.5c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
      Continue with Apple
    </button>

    <div class="divider">or with email</div>
    <input class="field" id="email" type="email" placeholder="you@email.com" autocomplete="email">
    <input class="field" id="password" type="password" placeholder="Password (min 6 chars)" autocomplete="current-password">
    <button class="btn btn-primary" id="submit"><span>Create account →</span></button>

    <div class="msg" id="msg"></div>
    <div class="trust"><span>🔒 No camera</span><span>🙅 No mic</span><span>💸 Free forever</span></div>
    <div class="legal">By continuing you agree to PayParty's <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.</div>
  </div>

  <script src="assets/silk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
  (function(){
    const $ = (s) => document.querySelector(s);
    const msg = $('#msg');
    let mode = 'signup';
    const REDIRECT = location.origin + (location.pathname.replace(/login\.html$/, '') || '/') + 'dashboard.html';
    function setMsg(text, kind){ msg.textContent = text || ''; msg.className = 'msg' + (kind ? ' ' + kind : ''); }

    // guard: library + config present?
    if (!window.supabase || !window.supabase.createClient) { setMsg('Could not load Supabase. Check your connection.', 'err'); return; }
    const KEY = window.PAYPARTY_SUPABASE_ANON_KEY || '';
    const sb = window.supabase.createClient(window.PAYPARTY_SUPABASE_URL, KEY, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } });
    function configured(){ if (!KEY || KEY.indexOf('PASTE_') === 0){ setMsg('Setup: paste your Supabase anon key in supabase-config.js', 'err'); return false; } return true; }

    // already logged in? go to dashboard
    if (configured()) sb.auth.getSession().then(({ data }) => { if (data && data.session) location.replace('dashboard.html'); });

    function setMode(m){
      mode = m;
      $('#tab-signup').classList.toggle('on', m === 'signup');
      $('#tab-login').classList.toggle('on', m === 'login');
      $('#title').innerHTML = m === 'signup' ? 'Join the <span class="grad">party.</span>' : 'Welcome <span class="grad">back.</span>';
      $('#subtitle').textContent = m === 'signup' ? 'Create your account and start earning in seconds.' : 'Log in to track your balance and cash out.';
      $('#submit').querySelector('span').textContent = m === 'signup' ? 'Create account →' : 'Log in →';
      $('#password').setAttribute('autocomplete', m === 'signup' ? 'new-password' : 'current-password');
      setMsg('');
    }
    $('#tab-signup').onclick = () => setMode('signup');
    $('#tab-login').onclick = () => setMode('login');

    async function oauth(provider){
      if (!configured()) return;
      setMsg('Redirecting to ' + provider + '…');
      const { error } = await sb.auth.signInWithOAuth({ provider, options: { redirectTo: REDIRECT } });
      if (error) setMsg(error.message, 'err');
    }
    $('#google').onclick = () => oauth('google');
    $('#apple').onclick = () => oauth('apple');

    async function emailAuth(){
      if (!configured()) return;
      const email = $('#email').value.trim(), password = $('#password').value;
      if (!/.+@.+\..+/.test(email)) return setMsg('Enter a valid email', 'err');
      if (password.length < 6) return setMsg('Password must be at least 6 characters', 'err');
      setMsg('Working…');
      try {
        if (mode === 'signup') {
          const { data, error } = await sb.auth.signUp({ email, password, options: { emailRedirectTo: REDIRECT } });
          if (error) return setMsg(error.message, 'err');
          if (data.session) location.replace('dashboard.html');
          else setMsg('Check your email to confirm your account ✉️', 'ok');
        } else {
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) return setMsg(error.message, 'err');
          location.replace('dashboard.html');
        }
      } catch (e) { setMsg(String(e.message || e), 'err'); }
    }
    $('#submit').onclick = emailAuth;
    $('#password').addEventListener('keydown', (e) => { if (e.key === 'Enter') emailAuth(); });
    setMode('signup');
  })();
  </script>
</body>
</html>
