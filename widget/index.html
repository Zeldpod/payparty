<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer-when-downgrade">
<title>PayParty — Sponsor</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;-webkit-user-select:none;user-select:none}
  .card{position:relative;height:100vh;display:flex;flex-direction:column;color:#fff;border-radius:18px;overflow:hidden;
    background:linear-gradient(168deg,rgba(130,97,255,.97),rgba(58,33,120,.99) 52%,#0f0a24);
    box-shadow:0 18px 50px rgba(20,8,60,.45),0 1px 0 rgba(255,255,255,.28) inset}
  .head{display:flex;align-items:center;gap:8px;padding:12px 13px 6px;-webkit-app-region:drag}
  .head .m{width:24px;height:24px;border-radius:7px;display:block}
  .head .nm{font-weight:800;font-size:13px;letter-spacing:-.01em}
  .head .live{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:#7CFFB0}
  .head .live i{width:6px;height:6px;border-radius:50%;background:#7CFFB0;box-shadow:0 0 8px #7CFFB0;animation:pl 1.6s infinite}
  @keyframes pl{0%,100%{opacity:.6}50%{opacity:1}}
  .tag{display:flex;align-items:center;justify-content:space-between;padding:0 14px;-webkit-app-region:drag}
  .tag .lab{font-size:9.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:#cbbcff;display:inline-flex;gap:5px;align-items:center}
  .tag .lab i{width:5px;height:5px;border-radius:50%;background:#cbbcff}
  .tag .rate{font-size:11px;font-weight:800;color:#7CFFB0;background:rgba(124,255,176,.14);padding:3px 9px;border-radius:99px}
  .creative{flex:1;min-height:0;margin:10px 12px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;overflow:auto}
  .ad-slot{display:flex;align-items:center;justify-content:center;width:100%;border-radius:14px;overflow:hidden;background:rgba(255,255,255,.06)}
  .ad-slot iframe{border:0;display:block;max-width:100%}
  #ad-native{width:100%}
  .fallback{position:absolute;inset:54px 12px 96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;
    border-radius:14px;background:linear-gradient(155deg,rgba(150,116,255,.9),rgba(74,42,150,.95) 60%,rgba(20,12,48,.96));
    color:#fff;font-weight:700;pointer-events:none;z-index:0;box-shadow:0 8px 26px rgba(20,8,60,.4) inset,0 0 0 1px rgba(255,255,255,.1) inset}
  .fallback .fb-badge{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#cbbcff;
    background:rgba(255,255,255,.12);padding:3px 9px;border-radius:99px}
  .fallback .fb-title{font-size:16px;font-weight:900;letter-spacing:-.01em}
  .fallback .fb-sub{font-size:11px;font-weight:600;color:#e2dbff;opacity:.9}
  .creative.has-ad .fallback{display:none}
  .cta{margin:10px 14px 0;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:14px;font-weight:800;font-size:13.5px;color:#04210d;cursor:pointer;border:none;
    background:linear-gradient(150deg,#1be06a,#00C853);box-shadow:0 8px 20px rgba(0,200,83,.4);-webkit-app-region:no-drag}
  .cta:hover{filter:brightness(1.06)}
  .cta:active{transform:translateY(1px)}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 14px 12px;font-size:11px;color:#cbbcff}
  .earn{font-weight:800;color:#fff;white-space:nowrap}
  .signin{font-size:10px;font-weight:700;color:#7CFFB0;opacity:.92;text-align:right}
  .coin{position:absolute;left:50%;top:46px;transform:translateX(-50%);font-weight:900;font-size:15px;color:#7CFFB0;opacity:0;pointer-events:none;z-index:5}
  @keyframes ppcoin{0%{opacity:0;transform:translate(-50%,0) scale(.5)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-46px) scale(1.1)}}
  [data-tier=compact] .head{padding-top:9px}
</style>
</head>
<body data-tier="standard">
  <div class="card">
    <div class="head"><img class="m" src="/assets/app-icon.png" alt=""><span class="nm">PayParty</span><span class="live"><i></i>earning</span></div>
    <div class="tag"><span class="lab"><i></i><span id="taglabel">Sponsored</span></span><span class="rate" id="rate">$0.05/min</span></div>
    <div class="creative" id="creative">
      <div class="ad-slot" id="ad-banner"></div>
      <div class="ad-slot" id="ad-native"></div>
      <div class="fallback"><span class="fb-badge">Your ad here</span><span class="fb-title">PayParty Premium</span><span class="fb-sub">Sponsor this slot · reach earners</span></div>
    </div>
    <button class="cta" id="cta">View sponsor →</button>
    <div class="foot"><span class="earn" id="earn">$0.00 estimated</span><span class="signin" id="signin" style="display:none">Sign in to earn real money</span><span class="grow" id="grow">Drag edge → grow 📈</span></div>
    <div class="coin" id="coin">+$0.05</div>
  </div>

<script>
(function () {
  'use strict';
  // ---- Adsterra units (live on the verified domain payparty.fun) ----
  var SMARTLINK = 'https://www.effectivecpmnetwork.com/nnybe0jx?key=45260f335c95f1d9a8ccca157fbffa03';
  // Each banner is a REAL same-origin page on payparty.fun (NOT srcdoc) so
  // Adsterra's invoke.js sees the verified hostname and actually fills.
  var BANNERS = {
    compact:  { page: '/widget/ad-320.html', w: 320, h: 50 },
    standard: { page: '/widget/ad-300.html', w: 300, h: 250 },
    large:    { page: '/widget/ad-300.html', w: 300, h: 250 }
  };
  var SOCIALBAR_SRC = 'https://pl29853227.effectivecpmnetwork.com/59/05/f8/5905f8858a836a832aaa98f8ca6b0851.js';
  var RATE = { compact: 0.02, standard: 0.05, large: 0.15 };

  // host=app (desktop transparent window) skips the page-level floating units
  // (Social Bar / Native) which would render outside the rounded card.
  var HOST = (new URLSearchParams(location.search).get('host') || 'web');
  var RICH_OK = HOST !== 'app';

  var $ = function (id) { return document.getElementById(id); };
  var tier = null, socialLoaded = false, nativeLoaded = false;

  function revealAd() { $('creative').classList.add('has-ad'); }
  function mountBanner(t) {
    var b = BANNERS[t] || BANNERS.standard;
    var slot = $('ad-banner');
    slot.innerHTML = '';
    var f = document.createElement('iframe');
    f.title = 'Sponsored ad';
    f.setAttribute('scrolling', 'no');
    f.width = b.w; f.height = b.h;
    f.src = b.page;
    f.style.cssText = 'width:' + b.w + 'px;height:' + b.h + 'px';
    // reveal the real ad on load; keep the timeout only as a backup
    f.addEventListener('load', revealAd);
    slot.appendChild(f);
    setTimeout(revealAd, 2500);
  }
  function loadNative() {
    if (nativeLoaded || !RICH_OK) return; nativeLoaded = true;
    var f = document.createElement('iframe');
    f.title = 'Sponsored';
    f.src = '/widget/ad-native.html';
    f.style.cssText = 'border:0;width:100%;height:250px;display:block;border-radius:14px';
    $('ad-native').appendChild(f);
  }
  function loadSocial() {
    if (socialLoaded || !RICH_OK) return; socialLoaded = true;
    var s = document.createElement('script'); s.src = SOCIALBAR_SRC; document.body.appendChild(s);
  }

  function setTier() {
    var h = window.innerHeight;
    var t = h >= 450 ? 'large' : h >= 300 ? 'standard' : 'compact';
    document.body.dataset.tier = t;
    $('rate').textContent = '$' + RATE[t].toFixed(2) + '/min';
    $('taglabel').textContent = t === 'large' ? 'Premium sponsor' : 'Sponsored';
    if (t !== tier) {
      tier = t;
      mountBanner(t);
      if (t === 'large') { loadNative(); loadSocial(); }
    }
  }
  var rt;
  window.addEventListener('resize', function () { clearTimeout(rt); rt = setTimeout(setTier, 250); });

  // Pick the tier (and mount the ad) up front so `tier` is set before the very
  // first earnings tick fires — otherwise the first /api/earn POST would send
  // tier:null (rejected 400) and popCoin would render +$NaN.
  setTier();

  // ---- earnings ----
  // signed in (?token=) -> credit REAL money via /api/earn and show the live balance
  // signed out          -> show a clearly-labeled local "estimated" counter
  var EARN_API = 'https://www.payparty.fun/api/earn';
  var TOKEN = (new URLSearchParams(location.search).get('token') || '').trim();
  // onClick reward: signed-out bumps the local estimate; signed-in just animates
  // (the real cashable balance is credited server-side via /api/earn).
  var onClickReward = function () { popCoin(RATE[tier] / 12 * 3); };

  function popCoin(a) {
    var c = $('coin'); c.textContent = '+$' + a.toFixed(2);
    c.style.animation = 'none'; void c.offsetWidth; c.style.animation = 'ppcoin 1.5s ease-out';
    // let an embedding host (extension) mirror the counter in its popup
    try { if (window.parent && window.parent !== window) window.parent.postMessage({ type: 'pp:earn', amount: a }, '*'); } catch (e) {}
  }

  // ---- "View sponsor" → Smartlink (paid on click) ----
  $('cta').addEventListener('click', function () {
    window.open(SMARTLINK, '_blank', 'noopener');
    onClickReward();
  });

  if (TOKEN) {
    // ---- REAL earnings: post verified seconds-watched, render server balance ----
    var earnTick = function () {
      fetch(EARN_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body: JSON.stringify({ seconds: 15, tier: tier })
      }).then(function (r) { return r.json(); }).then(function (d) {
        if (d && typeof d.balance === 'number') {
          $('earn').textContent = '$' + d.balance.toFixed(2) + ' balance';
          popCoin(RATE[tier] * 15 / 60);
        }
      }).catch(function () {});
    };
    $('earn').textContent = '$0.00 balance';
    setInterval(earnTick, 15000);
    earnTick();
  } else {
    // ---- estimated session earnings (DISPLAY ONLY, signed out) ----
    var dayKey = function () { var d = new Date(); return 'pp_earn_' + d.getFullYear() + '_' + (d.getMonth() + 1) + '_' + d.getDate(); };
    var earn = parseFloat(localStorage.getItem(dayKey()) || '0') || 0;
    var paint = function () { $('earn').textContent = '$' + earn.toFixed(2) + ' estimated'; };
    var bump = function (a) {
      earn = Math.round((earn + a) * 100) / 100;
      try { localStorage.setItem(dayKey(), String(earn)); } catch (e) {}
      paint();
      popCoin(a);
    };
    onClickReward = function () { bump(RATE[tier] / 12 * 3); };
    $('signin').style.display = '';
    $('grow').style.display = 'none';
    paint();
    setInterval(function () { bump(RATE[tier] / 12); }, 5000);
  }
})();
</script>
</body>
</html>
